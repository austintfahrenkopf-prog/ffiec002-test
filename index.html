<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FFIEC 002 — reachability test</title>
<style>
  body { font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
         max-width: 720px; margin: 6vh auto; padding: 0 20px; color: #14213d; }
  .ok { color: #1b7f3b; font-weight: 700; }
  .card { border: 1px solid #d8dee9; border-radius: 12px; padding: 24px; }
  code { background:#f2f4f8; padding:2px 6px; border-radius:6px; }
  button { font-size:16px; padding:10px 16px; border-radius:8px; border:1px solid #1b7f3b;
           background:#1b7f3b; color:#fff; cursor:pointer; }
  #stamp { font-size: 14px; color:#5a6478; }
</style>
</head>
<body>
  <div class="card">
    <h1>✅ <span class="ok">It loaded.</span></h1>
    <p>If you can read this from your <b>work computer</b>, then a site published
       from your personal PC is reachable through your corporate network.</p>
    <p id="stamp"></p>
    <p><button onclick="document.getElementById('out').textContent =
        'Button works — JavaScript is allowed here too. ' + new Date().toLocaleString();">
        Test JavaScript</button></p>
    <p id="out"></p>
    <hr>
    <p style="font-size:14px;color:#5a6478">This is a static reachability test.
       The real data explorer would load the FFIEC 002 parquet here.</p>
  </div>
<script>
  document.getElementById('stamp').textContent =
    'Page rendered at ' + new Date().toLocaleString() +
    '  ·  host: ' + location.host;
</script>
</body>
</html>
